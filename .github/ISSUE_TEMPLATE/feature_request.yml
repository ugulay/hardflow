name: ✨ Feature request
description: Suggest a tool, workflow, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Hardflow is a free, open-source hard-surface
        modeling toolkit — describe the workflow you want and how you'd expect
        it to behave.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow pain or the missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Keys, panel placement, defaults, etc.
    validations:
      required: true
  - type: input
    id: prior-art
    attributes:
      label: Prior art (optional)
      description: Is there an equivalent in another tool or app? e.g. "a mirror gizmo"
  - type: dropdown
    id: contribute
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Maybe, with guidance"
        - "Yes"
        - "No"
    validations:
      required: true
